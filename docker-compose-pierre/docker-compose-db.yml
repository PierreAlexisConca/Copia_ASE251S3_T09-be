version: '3'

services:
  sqlserver:
    image: concaflores/sql-server:2022
    container_name: pierre
    environment:
      SA_PASSWORD: "Alexis123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1434:1433"
    networks:
      - my-network

networks:
  my-network:
    external: true